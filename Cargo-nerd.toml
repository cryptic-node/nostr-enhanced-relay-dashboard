[package]
name = "nostr-enhanced-relay-dashboard"
version = "0.0.1"
edition = "2021"
authors = ["Cryptic Node"]
description = "Privacy-focused Nostr relay with integrated dashboard management"
license = "MIT"
repository = "https://github.com/cryptic-node/nostr-enhanced-relay-dashboard"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros", "ws"] }
tower-http = { version = "0.6", features = ["fs", "cors"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "chrono"] }

# Nostr protocol
nostr-sdk = "0.44"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# WebSocket client (for relay proxy)
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures = "0.3"

# HTTP client (for relay info fetching)
reqwest = { version = "0.12", features = ["json"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

[dev-dependencies]
# Testing
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
debug = true

[[bin]]
name = "nostr-enhanced-relay-dashboard"
path = "src/main.rs"
